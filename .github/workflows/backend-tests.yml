name: Backend Tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q
      - name: Safety Release Gate
        env:
          PYTHONPATH: .
          NEMOGUARD_ENABLED: "true"
          NEMOGUARD_CONTENT_ENABLED: "true"
          NEMOGUARD_TOPIC_ENABLED: "true"
          NEMOGUARD_FAIL_OPEN: "false"
          NEMOGUARD_STRICT_ORDER: "true"
        run: |
          pytest -q tests/test_preflight.py
          pytest -q tests/test_safety_checker.py
          pytest -q tests/test_safety_checker.py::SafetyCheckerTests::test_adversarial_suite_of_200_cases
